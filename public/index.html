<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>M3U8 Proxy Player</title>
  <style>
    body { font-family: Arial, Helvetica, sans-serif; padding: 20px; }
    .container { max-width: 900px; margin: 0 auto; }
    input[type=text] { width: 80%; padding: 8px; }
    button { padding: 8px 12px; }
    video { width: 100%; max-height: 600px; background: #000; margin-top: 12px; }
    .hint { color: #666; font-size: 0.9em; margin-top: 6px }
  </style>
</head>
<body>
  <div class="container">
    <h1>M3U8 Proxy Player</h1>
    <p>Enter an M3U8 URL and click <strong>Load</strong>. The player will load the playlist through the proxy at <code>/proxy?url=...</code>.</p>

    <div>
      <input id="m3u8Input" type="text" placeholder="https://example.com/playlist.m3u8" />
      <button id="loadBtn">Load</button>
      <button id="stopBtn">Stop</button>
    </div>
    <div class="hint">Tip: URLs will be proxied automatically, no need to include host in the proxy parameter.</div>

    <video id="video" controls></video>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.2/dist/hls.min.js"></script>
  <script src="/player.js"></script>
</body>
</html>
